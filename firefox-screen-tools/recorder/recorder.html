<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen Recorder</title>
  <style>
    body {
      background-color: #f5f5f7;
      color: #333;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    
    .hidden {
      display: none;
    }
    
    .recording-status {
      color: #f44336;
      font-weight: bold;
      margin: 20px 0;
      animation: blink 2s infinite;
    }
    
    .start-button {
      background-color: #0060df;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      margin: 20px auto;
      display: block;
    }
    
    .start-button:hover {
      background-color: #0052cc;
    }
    
    .recording-container {
      margin-top: 30px;
    }
    
    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <h1>Screen Recorder</h1>
  
  <div id="start-container">
    <p>Klik op de knop om te beginnen met opnemen:</p>
    <button id="start-recording-button" class="start-button">Start Opname</button>
  </div>
  
  <div id="recording-container" class="recording-container hidden">
    <p class="recording-status">Opname bezig...</p>
    <button id="stop-recording-button" class="start-button">Stop Opname</button>
    <video id="preview" class="hidden" autoplay muted></video>
  </div>
  
  <script src="recorder.js"></script>
</body>
</html>

<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WEBDL Gallery</title>
<link rel="stylesheet" href="/styles.css?v=20260501-34">
</head>
<body>
  <header class="topbar">
    <h1>WEBDL Gallery</h1>
    <div class="filters">
      <input id="q" type="search" placeholder="Zoeken...">
      <select id="platform"><option value="">Alle platforms</option></select>
      <select id="channel"><option value="">Alle kanalen</option></select>
      <select id="sort">
        <option value="recent">Nieuwste</option>
        <option value="rating">Rating</option>
        <option value="random">Random</option>
      </select>
      <select id="minRating">
        <option value="">Min rating</option>
        <option value="5">★★★★★</option>
        <option value="4">★★★★</option>
        <option value="3">★★★</option>
        <option value="2">★★</option>
        <option value="1">★</option>
      </select>
      <select id="mediaType">
        <option value="">Alles</option>
        <option value="video">🎬 Video</option>
        <option value="image">🖼 Afbeelding</option>
      </select>
      <button id="refresh">Ververs</button>
      <button id="themeBtn" class="theme-btn" title="Thema wisselen">💎</button>
      <span id="stats" class="stats"></span>
    </div>
  </header>

  <section id="activeStrip" class="active-strip" aria-live="polite"></section>
  <main id="grid" class="grid"></main>
  <div id="sentinel" class="sentinel">Laden…</div>

  <!-- ═══ VIEWER OVERLAY ════════════════════════════════════════════════════ -->
  <div id="viewer" class="viewer hidden" aria-hidden="true">

    <!-- LEFT SIDEBAR -->
    <aside id="vSidebar" class="vsidebar">

      <!-- Sidebar header: mode + filter -->
      <div class="vsidebar-head">
        <select id="vMode" title="Modus">
          <option value="recent">Recent</option>
          <option value="channel">Kanaal</option>
        </select>
        <select id="vFilter" title="Type filter">
          <option value="all">Alles</option>
          <option value="video">Video</option>
          <option value="image">Foto</option>
        </select>
        <select id="vTagFilter" title="Tag filter">
          <option value="">Alle tags</option>
        </select>
        <button id="vReload" title="Herladen">↻</button>
      </div>

      <!-- Slideshow controls -->
      <div class="vsidebar-slideshow">
        <button id="vSlideshow" title="Slideshow aan/uit">▶︎ Dia</button>
        <select id="vSlideshowSec" title="Interval">
          <option value="2">2s</option>
          <option value="4" selected>4s</option>
          <option value="7">7s</option>
          <option value="10">10s</option>
          <option value="15">15s</option>
          <option value="30">30s</option>
          <option value="60">1m</option>
          <option value="300">5m</option>
        </select>
        <button id="vWrap" title="Wrap aan/uit" class="active">🔁 Wrap: aan</button>
        <button id="vRandom" title="Random aan/uit">🔀 Rand: uit</button>
        <button id="vVideoWait" title="Wacht op video-einde" class="active">⏳ Wacht: aan</button>
      </div>

      <!-- Items list -->
      <div id="vList" class="vsidebar-list"></div>
    </aside>

    <!-- Sidebar backdrop (mobiel) -->
    <div id="vSidebarBackdrop" class="vsidebar-backdrop hidden"></div>

    <!-- MAIN: topbar + stage -->
    <div class="viewer-main">

      <!-- Topbar -->
      <div class="viewer-topbar">
        <!-- Links: sidebar toggle + titel -->
        <div class="vtop-left">
          <button id="vBtnSidebar" class="vtop-btn" title="Sidebar openen/sluiten (S)">☰</button>
          <div class="vtop-info">
            <div id="vNowTitle" class="vtop-title"></div>
            <div id="vNowSub" class="vtop-sub"></div>
          </div>
        </div>

        <!-- Midden: rating -->
        <div class="vtop-center">
          <div class="vtop-rating" id="vNowRating"></div>
          <select id="vRatingSelect" class="vtop-select" title="Rating instellen">
            <option value="">—</option>
            <option value="0.5">0.5</option>
            <option value="1">1</option>
            <option value="1.5">1.5</option>
            <option value="2">2</option>
            <option value="2.5">2.5</option>
            <option value="3">3</option>
            <option value="3.5">3.5</option>
            <option value="4">4</option>
            <option value="4.5">4.5</option>
            <option value="5">5</option>
          </select>
        </div>

        <!-- Rechts: tools -->
        <div class="vtop-right">
          <label class="vtop-ctrl" title="Volume"><span>Vol</span> <input id="vVol" type="range" min="0" max="1" step="0.01" value="0.8"></label>
          <button id="vBtnMute" class="vtop-btn" title="Geluid dempen (M)">🔊</button>
          <span class="vtop-sep"></span>
          <button id="vBtnOpen" class="vtop-btn" title="Bron-URL openen in browser">🔗 Bron</button>
          <button id="vBtnFinder" class="vtop-btn" title="Bestand tonen in Finder">📁 Finder</button>
          <button id="vBtnRotate" class="vtop-btn" title="Media 90° draaien" onmousedown="window.__wdRotateMedia && window.__wdRotateMedia(event)" onclick="window.__wdRotateMedia && window.__wdRotateMedia(event)">↻ +90°</button>
          <button id="vBtnTags" class="vtop-btn" title="Tags beheren" onmousedown="window.__wdOpenTags && window.__wdOpenTags(event)" onclick="window.__wdOpenTags && window.__wdOpenTags(event)">🏷 Tags</button>
          <button id="vBtnLog" class="vtop-btn" title="Activiteitenlog tonen (L)">📋 Log</button>
          <button id="vBtnTheme" class="vtop-btn" title="Thema wisselen">💎</button>
          <input id="vZoomRange" class="vzoom-hidden" type="range" min="100" max="600" step="10" value="100" aria-hidden="true" tabindex="-1">
          <button id="vZoomReset" class="vzoom-hidden" aria-hidden="true" tabindex="-1">Reset</button>
          <button id="vSlideshow2" class="vzoom-hidden" aria-hidden="true" tabindex="-1">▶ Dia</button>
          <button id="vRandom2" class="vzoom-hidden" aria-hidden="true" tabindex="-1">🔀 Rand</button>
          <button id="vClose" class="vtop-close" title="Viewer sluiten (Esc)">✕</button>
        </div>
      </div>

      <!-- Stage -->
      <div class="viewer-stage" id="vStage">
        <div id="vContent" class="vcontent"></div>
        <!-- Progress bar: absoluut gepositioneerd, JS alignt op video-onderkant -->
        <div class="vprogressbar" id="vProgressBar">
          <div class="vprogressbar-fill" id="vProgressFill"></div>
          <div class="vprogressbar-handle" id="vProgressHandle"></div>
        </div>
        <div class="vbottom-controls hidden" id="vBottomControls" aria-label="Video bediening">
          <button id="vBtnPlayPause" class="vplay-btn" title="Afspelen/pauzeren (spatie)">▶</button>
          <div class="vtime-label" id="vTimeLabel">0:00 / 0:00</div>
          <button id="vBtnRotateBottom" class="vbottom-rotate" title="Media 90° draaien">↻ +90°</button>
          <input id="vSeek" class="vbottom-seek" type="range" min="0" max="1000" step="1" value="0" title="Positie in video">
        </div>
        <button id="vBtnRotateStage" class="vrotate-float" title="Media 90° draaien">↻ +90°</button>
        <button class="viewer-nav prev" id="vPrev" title="Vorige (←)">‹</button>
        <button class="viewer-nav next" id="vNext" title="Volgende (→)">›</button>
        <div class="hud-pill hud-left" id="vHudLeft"></div>
        <div class="hud-pill hud-right" id="vHudRight"></div>
      </div>

    </div><!-- /viewer-main -->

    <!-- Tag dialog -->
    <div id="vTagDialog" class="tag-dialog hidden">
      <div class="tag-dialog-inner">
        <div class="tag-dialog-head">
          <strong>Tags</strong>
          <button id="vBtnCloseTagDialog">✕</button>
        </div>
        <div class="tag-current-wrap">
          <div class="tag-label">Op dit item</div>
          <div id="vTagCurrent" class="tag-current"></div>
        </div>
        <div class="tag-quick-wrap">
          <div class="tag-label">Favoriet / vaak gebruikt</div>
          <div id="vTagQuick" class="tag-quick"></div>
        </div>
        <div class="tag-search">
          <input id="vTagSearch" type="search" placeholder="Zoek bestaande tags...">
        </div>
        <div id="vTagList" class="tag-list"></div>
        <div class="tag-new">
          <input id="vNewTagInput" type="text" placeholder="Nieuwe tag voor dit item...">
          <button id="vBtnAddTag">＋ Maak + voeg toe</button>
        </div>
      </div>
    </div>

    <!-- Log panel -->
    <div id="vLogPanel" class="log-panel hidden">
      <div class="log-panel-head">Log</div>
      <pre id="vLogBody"></pre>
    </div>

  </div><!-- /viewer -->

  <script src="/app.js?v=20260501-34"></script>
  <script src="/viewer.js?v=20260501-34"></script>
  <script>
  // ─── Thema switcher ─────────────────────────────────────────────────────
  (function() {
    const THEMES = [
      { key: 'amethyst', icon: '💎', label: 'Deep Amethyst' },
      { key: 'arctic',   icon: '❄️', label: 'Arctic Slate' },
      { key: 'pearl',    icon: '⚪', label: 'Pearl & Onyx' },
    ];

    function getThemeIdx() {
      const saved = localStorage.getItem('webdl_theme') || 'amethyst';
      const idx = THEMES.findIndex(t => t.key === saved);
      return idx >= 0 ? idx : 0;
    }

    function applyTheme(idx) {
      const theme = THEMES[idx];
      document.documentElement.setAttribute('data-theme', theme.key);
      localStorage.setItem('webdl_theme', theme.key);
      // Update alle thema-knoppen
      document.querySelectorAll('#themeBtn, #vBtnTheme').forEach(btn => {
        btn.textContent = theme.icon;
        btn.title = theme.label;
      });
    }

    function cycleTheme() {
      const next = (getThemeIdx() + 1) % THEMES.length;
      applyTheme(next);
    }

    // Apply saved theme on load
    applyTheme(getThemeIdx());

    // Bind buttons
    document.getElementById('themeBtn')?.addEventListener('click', cycleTheme);
    document.getElementById('vBtnTheme')?.addEventListener('click', cycleTheme);
  })();
  </script>
</body>
</html>

max_length = 180
template = '%title - motherless.com'
replace = [
  { from = '\s*[-|–—•]+\s*(?:www\\.)?[Mm][Oo][Tt][Hh][Ee][Rr][Ll][Ee][Ss][Ss]\\.com(?:\/[\\w._-]+){0,6}(?:\s*[™®©]+)?\s*$', to = '' },
  { from = '\s*\|\s*(?:www\\.)?[Mm][Oo][Tt][Hh][Ee][Rr][Ll][Ee][Ss][Ss]\\.com(?:\s*[™®©]+)?\s*$', to = '' },

# WEBDL - Video DownloadHelper Smart Naming
# Place this file in Video DownloadHelper's smartnaming configuration location.
# This config aims to keep filenames consistent and WEBDL-import friendly.

max_length = 160
template = '%title - %hostname'

[[rule]]
url = 'youtube.com'
max_length = 180
selector = 'ytd-video-owner-renderer ytd-channel-name a, ytd-video-owner-renderer #channel-name a, #owner ytd-channel-name a, #owner #channel-name a, #owner a[href^="/@"], #owner a[href^="/channel/"], #owner-name a, #upload-info a[href^="/@"], #upload-info a[href^="/channel/"], ytd-reel-player-header-renderer a[href^="/@"], ytd-reel-player-header-renderer a[href^="/channel/"], .ytd-reel-player-header-renderer a[href^="/@"], .ytd-reel-player-header-renderer a[href^="/channel/"], a[href^="/@"], a[href^="/channel/"], a[href^="https://www.youtube.com/@"], a[href^="https://www.youtube.com/channel/"]'
template = 'youtube.com - %selector - %title'
replace = [
  { from = '\s*[-|–—•]+\s*YouTube\s*$', to = '' },
  { from = '\s*\|\s*YouTube\s*$', to = '' },
  { from = '^(youtube\\.com\s*-\s*)@', to = '$1' },
  { from = '\s*-+\s*-+\s*', to = ' - ' },
  { from = '^(youtube\\.com)\s*[-|–—•]+\s*[-|–—•]+\s*', to = '$1 - ' },
  { from = '\s*[-|–—•]+\s*[-|–—•]+\s*', to = ' - ' },
  { from = '\s+', to = ' ' }
]

